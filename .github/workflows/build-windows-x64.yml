name: Build Windows x64 release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to create or update (for example, bun-v1.4.0)
        required: false
        type: string
      ref:
        description: Git ref to build
        default: main
        required: true
        type: string

concurrency:
  group: build-windows-x64-${{ inputs.ref }}-${{ inputs.tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.2"
  RUSTUP_TOOLCHAIN: nightly-2026-05-06
  LLVM_VERSION: "21.1.8"

jobs:
  build-windows-x64:
    name: Build bun-windows-x64
    runs-on: windows-2025
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup LLVM 21 for Windows x64
        shell: pwsh
        run: |
          $version = "${{ env.LLVM_VERSION }}"
          $triple = "x86_64-pc-windows-msvc"
          $llvmDir = Join-Path $env:RUNNER_TEMP "llvm-$version-$triple"
          $archive = Join-Path $env:RUNNER_TEMP "clang+llvm-$version-$triple.tar.xz"
          $clangCl = Join-Path $llvmDir "bin\clang-cl.exe"

          if (!(Test-Path $clangCl)) {
            $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/clang+llvm-$version-$triple.tar.xz"
            curl.exe -L --retry 5 -o $archive $url
            New-Item -ItemType Directory -Force -Path $llvmDir | Out-Null
            tar.exe -xf $archive -C $llvmDir --strip-components=1
          }

          $bin = Join-Path $llvmDir "bin"
          $bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $clangCl --version

      - name: Setup NASM for Windows x64
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          $nasmDir = "C:\Program Files\NASM"
          if (Test-Path $nasmDir) {
            $nasmDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          nasm -v

      - name: Setup Rust
        run: rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if bun install --frozen-lockfile; then
              exit 0
            fi
            status=$?
            if [ "$attempt" = "3" ]; then
              exit "$status"
            fi
            echo "bun install failed with status ${status}; retrying..."
            sleep $((attempt * 5))
          done

      - name: Print toolchain versions
        run: |
          which clang-cl || true
          clang-cl --version
          which lld-link || true
          lld-link --version
          which llvm-rc || true
          llvm-rc --version
          which nasm || true
          nasm -v
          rustc +"$RUSTUP_TOOLCHAIN" -vV
          bun --version

      - name: Prefetch libarchive sources
        run: |
          bun scripts/build.ts --profile=release --configure-only
          ninja -C build/release clone-libarchive

      - name: Build Bun
        run: bun scripts/build.ts --profile=release

      - name: Package binary
        run: |
          test -f build/release/bun.exe
          mkdir -p release/bun-windows-x64
          cp build/release/bun.exe release/bun-windows-x64/bun.exe
          (
            cd release
            cmake -E tar cf ../bun-windows-x64.zip --format=zip bun-windows-x64
          )

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bun-windows-x64
          path: bun-windows-x64.zip
          if-no-files-found: error

      - name: Upload release asset
        if: inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" bun-windows-x64.zip --clobber
