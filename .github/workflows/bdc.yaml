name: Build release binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to create or update (for example, bun-v1.4.0)
        required: true
        type: string
      ref:
        description: Git ref to build
        default: main
        required: true
        type: string

concurrency:
  group: build-release-binaries-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.2"
  RUSTUP_TOOLCHAIN: nightly-2026-05-06

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            asset: bun-linux-x64
            binary: build/release/bun
            build_args: ""
          - runner: ubuntu-24.04
            asset: bun-linux-x64-baseline
            binary: build/release/bun
            build_args: --baseline=on
          - runner: ubuntu-24.04-arm
            asset: bun-linux-aarch64
            binary: build/release/bun
            build_args: ""
          - runner: macos-15-intel
            asset: bun-darwin-x64
            binary: build/release/bun
            build_args: ""
          - runner: macos-15-intel
            asset: bun-darwin-x64-baseline
            binary: build/release/bun
            build_args: --baseline=on
          - runner: macos-15
            asset: bun-darwin-aarch64
            binary: build/release/bun
            build_args: ""
          - runner: windows-2025
            asset: bun-windows-x64
            binary: build/release/bun.exe
            build_args: ""
          - runner: windows-2025
            asset: bun-windows-x64-baseline
            binary: build/release/bun.exe
            build_args: --baseline=on
          - runner: windows-11-arm
            asset: bun-windows-aarch64
            binary: build/release/bun.exe
            build_args: ""
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends cmake ninja-build clang-21 lld-21 llvm-21 nasm

      - name: Setup Rust
        run: rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Bun
        run: bun scripts/build.ts --profile=release ${{ matrix.build_args }}

      - name: Package binary
        env:
          ASSET: ${{ matrix.asset }}
          BINARY: ${{ matrix.binary }}
        run: |
          test -f "$BINARY"
          mkdir -p "release/$ASSET"
          cp "$BINARY" "release/$ASSET/$(basename "$BINARY")"
          (
            cd release
            cmake -E tar cf "../$ASSET.zip" --format=zip "$ASSET"
          )

      - name: Upload release asset
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" release-assets/*.zip --clobber
