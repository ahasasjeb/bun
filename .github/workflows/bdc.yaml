name: Build release binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to create or update (for example, bun-v1.4.0)
        required: true
        type: string
      ref:
        description: Git ref to build
        default: main
        required: true
        type: string

concurrency:
  group: build-release-binaries-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.2"
  RUSTUP_TOOLCHAIN: nightly-2026-05-06
  LLVM_VERSION: "21.1.8"

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            asset: bun-windows-x64
            binary: build/release/bun.exe
            build_args: ""
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Windows LLVM
        shell: pwsh
        run: |
          $version = "${{ env.LLVM_VERSION }}"
          $triple = "x86_64-pc-windows-msvc"
          $llvmDir = Join-Path $env:RUNNER_TEMP "llvm-$version-$triple"
          $archive = Join-Path $env:RUNNER_TEMP "clang+llvm-$version-$triple.tar.xz"
          $clangCl = Join-Path $llvmDir "bin\clang-cl.exe"

          if (!(Test-Path $clangCl)) {
            $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$version/clang+llvm-$version-$triple.tar.xz"
            curl.exe -L --retry 5 -o $archive $url
            New-Item -ItemType Directory -Force -Path $llvmDir | Out-Null
            tar.exe -xf $archive -C $llvmDir --strip-components=1
          }

          $bin = Join-Path $llvmDir "bin"
          $bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $clangCl --version

      - name: Setup Windows NASM
        shell: pwsh
        run: |
          choco install nasm -y --no-progress
          $nasmDir = "C:\Program Files\NASM"
          if (Test-Path $nasmDir) {
            $nasmDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          nasm -v

      - name: Setup Rust
        run: rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if bun install --frozen-lockfile; then
              exit 0
            fi
            status=$?
            if [ "$attempt" = "3" ]; then
              exit "$status"
            fi
            echo "bun install failed with status ${status}; retrying..."
            sleep $((attempt * 5))
          done

      - name: Prefetch libarchive sources
        run: |
          bun scripts/build.ts --profile=release ${{ matrix.build_args }} --configure-only
          ninja -C build/release clone-libarchive

      - name: Build Bun
        run: bun scripts/build.ts --profile=release ${{ matrix.build_args }}

      - name: Package binary
        env:
          ASSET: ${{ matrix.asset }}
          BINARY: ${{ matrix.binary }}
        run: |
          test -f "$BINARY"
          mkdir -p "release/$ASSET"
          cp "$BINARY" "release/$ASSET/$(basename "$BINARY")"
          (
            cd release
            cmake -E tar cf "../$ASSET.zip" --format=zip "$ASSET"
          )

      - name: Upload release asset
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" release-assets/*.zip --clobber
